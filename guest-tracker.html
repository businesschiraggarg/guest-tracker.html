<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Tracker — The Oberoi Wildflower Hall</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #FAF7F2; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    input, textarea, button { font-family: inherit; }
    textarea { resize: vertical; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4B978; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

// ─── Inline SVG icons — no CDN, always renders ────────────────────────────────
const SVG = {
  search:   <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  plus:     <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  plusSm:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  x:        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  xSm:      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  back:     <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  user:     <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  clock:    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  mapPin:   <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  refresh:  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
  wifiOff:  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
};

// ─── Paste your Apps Script Web App deployment URL here ──────────────────────
const API_URL = '';

// ─── Brand tokens ─────────────────────────────────────────────────────────────
const C = {
  gold:      '#A98239',
  goldDark:  '#8C6A2E',
  goldLight: '#D4B978',
  navy:      '#0B2545',
  navyDark:  '#081B33',
  cream:     '#FAF7F2',
  ink:       '#1C1C1C',
  inkSoft:   '#5C5C5C',
  line:      '#E5E0D8',
  white:     '#FFFFFF',
};

// ─── Demo data ────────────────────────────────────────────────────────────────
function daysFromNow(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function hoursAgo(n) {
  const d = new Date(); d.setHours(d.getHours() - n);
  return d.toISOString();
}
const SEED_GUESTS = [
  { id:'g1', room:'101', guestName:'Mr. & Mrs. Garg',     checkIn:daysFromNow(-2), checkOut:daysFromNow(2) },
  { id:'g2', room:'214', guestName:'Ms. Aanya Kapoor',    checkIn:daysFromNow(-1), checkOut:daysFromNow(1) },
  { id:'g3', room:'308', guestName:'Mr. James Whitfield', checkIn:daysFromNow(-3), checkOut:daysFromNow(4) },
  { id:'g4', room:'112', guestName:'Dr. Meera Iyer',      checkIn:daysFromNow(0),  checkOut:daysFromNow(3) },
];
const SEED_NOTES = [
  { id:'n1', guestId:'g1', metBy:'Priya Sharma', text:"Checked in, very happy with the suite upgrade. Mentioned it's their anniversary this week.", timestamp:hoursAgo(28) },
  { id:'n2', guestId:'g1', metBy:'Rohan Mehta',  text:'Requested romantic dinner setup at Suryamahal tonight 8pm for the anniversary.', timestamp:hoursAgo(3) },
  { id:'n3', guestId:'g2', metBy:'Rohan Mehta',  text:'Traveling solo for work. Asked about boat ride timings and a quiet spot to take calls.', timestamp:hoursAgo(20) },
  { id:'n4', guestId:'g2', metBy:'Arjun Singh',  text:'Slightly jet-lagged, requested early breakfast at 7am tomorrow.', timestamp:hoursAgo(4) },
  { id:'n5', guestId:'g3', metBy:'Priya Sharma', text:'Repeat guest, prefers the same butler as last visit — arranged.', timestamp:hoursAgo(40) },
  { id:'n6', guestId:'g3', metBy:'Priya Sharma', text:'Mentioned the spa was excellent. Enjoying the stay, no pending requests.', timestamp:hoursAgo(16) },
  { id:'n7', guestId:'g4', metBy:'Arjun Singh',  text:'Just checked in, slightly tired from the drive. Asked for restaurant recommendations for tonight, leaning towards Indian cuisine.', timestamp:hoursAgo(1) },
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}
function fmtDateTime(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short' }) + ' · ' +
         dt.toLocaleTimeString('en-IN', { hour:'numeric', minute:'2-digit' });
}
function nightsLeft(checkOut) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(checkOut + 'T00:00:00') - today) / 86400000);
}

// ─── Shared styles ────────────────────────────────────────────────────────────
const labelSt = {
  display:'block', fontSize:'12px', fontWeight:600, color:C.inkSoft,
  marginBottom:'6px', textTransform:'uppercase', letterSpacing:'0.03em',
};
const inputSt = {
  width:'100%', padding:'11px 12px', borderRadius:'8px',
  border:`1px solid ${C.line}`, fontSize:'15px', color:C.ink, outline:'none',
};
const overlayWrap = {
  position:'fixed', inset:0, background:'rgba(11,37,69,0.45)',
  display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:50,
};
const sheetBody = {
  background:C.white, width:'100%', maxWidth:'560px',
  borderRadius:'16px 16px 0 0', maxHeight:'92vh', overflowY:'auto',
  boxShadow:'0 -8px 30px rgba(0,0,0,0.2)',
};

// ─── Status pill ──────────────────────────────────────────────────────────────
function StatusPill({ checkOut }) {
  const n = nightsLeft(checkOut);
  if (n <= 0) return null;
  if (n === 1) return <span style={{ fontSize:'11px', fontWeight:600, padding:'3px 8px', borderRadius:'4px', background:'#FBEAEA', color:'#A23B3B', whiteSpace:'nowrap' }}>Departs today</span>;
  return <span style={{ fontSize:'11px', fontWeight:600, padding:'3px 8px', borderRadius:'4px', background:'#EEF3EC', color:'#4A7A52', whiteSpace:'nowrap' }}>{n} nights left</span>;
}

// ─── New guest form ───────────────────────────────────────────────────────────
function NewGuestForm({ onSave, onCancel }) {
  const [f, setF] = useState({ room:'', guestName:'', checkIn:'', checkOut:'', metBy:'', note:'' });
  const ok = f.room.trim() && f.guestName.trim() && f.checkIn && f.checkOut && f.metBy.trim() && f.note.trim();
  const set = k => e => setF(p => ({...p, [k]: e.target.value}));

  return (
    <div style={overlayWrap}>
      <div style={sheetBody}>
        <div style={{ position:'sticky', top:0, background:C.white, zIndex:1, padding:'20px 20px 16px', borderBottom:`1px solid ${C.line}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <h2 style={{ margin:0, fontSize:'18px', fontWeight:600, color:C.navy, fontFamily:'Georgia, serif' }}>Log a new guest</h2>
          <button onClick={onCancel} style={{ background:'none', border:'none', cursor:'pointer', padding:'6px', color:C.inkSoft, display:'flex', alignItems:'center' }}>
            {SVG.x}
          </button>
        </div>
        <div style={{ padding:'20px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px' }}>
            <div>
              <label style={labelSt}>Room number *</label>
              <input style={inputSt} value={f.room} onChange={set('room')} placeholder="e.g. 214" />
            </div>
            <div>
              <label style={labelSt}>Met by *</label>
              <input style={inputSt} value={f.metBy} onChange={set('metBy')} placeholder="Your name" />
            </div>
          </div>
          <div style={{ marginBottom:'14px' }}>
            <label style={labelSt}>Guest name *</label>
            <input style={inputSt} value={f.guestName} onChange={set('guestName')} placeholder="e.g. Mr. & Mrs. Garg" />
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px' }}>
            <div>
              <label style={labelSt}>Check-in *</label>
              <input type="date" style={inputSt} value={f.checkIn} onChange={set('checkIn')} />
            </div>
            <div>
              <label style={labelSt}>Check-out *</label>
              <input type="date" style={inputSt} value={f.checkOut} onChange={set('checkOut')} />
            </div>
          </div>
          <div style={{ marginBottom:'20px' }}>
            <label style={labelSt}>First note — status, plans, mood, requests *</label>
            <textarea style={{ ...inputSt, minHeight:'100px' }} value={f.note} onChange={set('note')} placeholder="e.g. Just checked in, asked about dinner reservations tonight." />
          </div>
          <button onClick={() => ok && onSave(f)} disabled={!ok}
            style={{ width:'100%', padding:'14px', borderRadius:'8px', border:'none', background: ok ? C.navy : C.line, color: ok ? C.white : C.inkSoft, fontSize:'15px', fontWeight:600, cursor: ok ? 'pointer' : 'not-allowed' }}>
            Add to active guests
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Add note form ────────────────────────────────────────────────────────────
function AddNoteForm({ guest, onSave, onCancel }) {
  const [metBy, setMetBy] = useState('');
  const [text, setText]   = useState('');
  const ok = metBy.trim() && text.trim();

  return (
    <div style={overlayWrap}>
      <div style={sheetBody}>
        <div style={{ position:'sticky', top:0, background:C.white, zIndex:1, padding:'20px 20px 16px', borderBottom:`1px solid ${C.line}`, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <h2 style={{ margin:0, fontSize:'18px', fontWeight:600, color:C.navy, fontFamily:'Georgia, serif' }}>Add a note</h2>
            <p style={{ margin:'2px 0 0', fontSize:'13px', color:C.inkSoft }}>Room {guest.room} · {guest.guestName}</p>
          </div>
          <button onClick={onCancel} style={{ background:'none', border:'none', cursor:'pointer', padding:'6px', color:C.inkSoft, display:'flex', alignItems:'center' }}>
            {SVG.x}
          </button>
        </div>
        <div style={{ padding:'20px' }}>
          <div style={{ marginBottom:'14px' }}>
            <label style={labelSt}>Met by *</label>
            <input style={inputSt} value={metBy} onChange={e => setMetBy(e.target.value)} placeholder="Your name" autoFocus />
          </div>
          <div style={{ marginBottom:'20px' }}>
            <label style={labelSt}>What's going on *</label>
            <textarea style={{ ...inputSt, minHeight:'110px' }} value={text} onChange={e => setText(e.target.value)} placeholder="e.g. Asked about late checkout, said they're enjoying the spa." />
          </div>
          <p style={{ fontSize:'12px', color:C.inkSoft, marginBottom:'20px' }}>
            This adds a new entry to the timeline — it won't replace earlier notes.
          </p>
          <button onClick={() => ok && onSave({ metBy, text })} disabled={!ok}
            style={{ width:'100%', padding:'14px', borderRadius:'8px', border:'none', background: ok ? C.navy : C.line, color: ok ? C.white : C.inkSoft, fontSize:'15px', fontWeight:600, cursor: ok ? 'pointer' : 'not-allowed' }}>
            Add note
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Guest card ───────────────────────────────────────────────────────────────
function GuestCard({ guest, latestNote, noteCount, onClick }) {
  return (
    <button onClick={onClick} style={{ width:'100%', textAlign:'left', background:C.white, border:`1px solid ${C.line}`, borderRadius:'12px', padding:'16px', cursor:'pointer', display:'block', marginBottom:'10px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'8px' }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:'10px' }}>
          <span style={{ fontSize:'20px', fontWeight:700, color:C.navy, fontFamily:'Georgia, serif' }}>{guest.room}</span>
          <span style={{ fontSize:'15px', fontWeight:600, color:C.ink }}>{guest.guestName}</span>
        </div>
        <StatusPill checkOut={guest.checkOut} />
      </div>
      <p style={{ margin:'0 0 10px', fontSize:'13.5px', color:C.inkSoft, lineHeight:1.5, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
        {latestNote ? latestNote.text : 'No notes added yet.'}
      </p>
      <div style={{ display:'flex', alignItems:'center', gap:'14px', fontSize:'12px', color:C.goldDark }}>
        {latestNote && (<>
          <span style={{ display:'flex', alignItems:'center', gap:'4px' }}>{SVG.user} {latestNote.metBy}</span>
          <span style={{ display:'flex', alignItems:'center', gap:'4px' }}>{SVG.clock} {fmtDateTime(latestNote.timestamp)}</span>
        </>)}
        {noteCount > 1 && <span style={{ marginLeft:'auto', fontSize:'11px', color:C.inkSoft }}>{noteCount} notes</span>}
      </div>
    </button>
  );
}

// ─── Note row ─────────────────────────────────────────────────────────────────
function NoteRow({ note, isFirst }) {
  return (
    <div style={{ display:'flex', gap:'12px', marginBottom:'16px' }}>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', paddingTop:'4px' }}>
        <div style={{ width:'9px', height:'9px', borderRadius:'50%', background: isFirst ? C.gold : C.line, border: isFirst ? `2px solid ${C.goldLight}` : 'none', flexShrink:0 }} />
        <div style={{ width:'1.5px', flex:1, background:C.line, marginTop:'4px' }} />
      </div>
      <div style={{ flex:1, paddingBottom:'2px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px', flexWrap:'wrap', gap:'6px' }}>
          <span style={{ fontSize:'13px', fontWeight:600, color:C.navy }}>{note.metBy}</span>
          <span style={{ fontSize:'11.5px', color:C.inkSoft }}>{fmtDateTime(note.timestamp)}</span>
        </div>
        <p style={{ margin:0, fontSize:'14.5px', color:C.ink, lineHeight:1.55 }}>{note.text}</p>
      </div>
    </div>
  );
}

// ─── Guest detail — full screen, with back button ─────────────────────────────
function GuestDetail({ guest, notes, onClose, onAddNote }) {
  return (
    <div style={{ position:'fixed', inset:0, background:C.cream, zIndex:50, overflowY:'auto' }}>

      {/* Navy header with back button */}
      <div style={{ background:`linear-gradient(135deg, ${C.navy}, ${C.navyDark})`, padding:'0 20px 24px' }}>
        {/* Back button row */}
        <div style={{ paddingTop:'16px', paddingBottom:'12px' }}>
          <button onClick={onClose} style={{ display:'flex', alignItems:'center', gap:'6px', background:'none', border:'none', cursor:'pointer', color:C.goldLight, fontSize:'14px', fontWeight:600, padding:0 }}>
            {SVG.back} Back
          </button>
        </div>

        {/* Room + guest info */}
        <div style={{ display:'flex', alignItems:'baseline', gap:'12px', marginBottom:'6px' }}>
          <span style={{ fontSize:'32px', fontWeight:700, color:C.goldLight, fontFamily:'Georgia, serif' }}>{guest.room}</span>
          <StatusPill checkOut={guest.checkOut} />
        </div>
        <h2 style={{ margin:'0 0 8px', fontSize:'20px', fontWeight:600, color:C.white }}>{guest.guestName}</h2>
        <p style={{ margin:0, fontSize:'13px', color:'#C9D4E3' }}>{fmtDate(guest.checkIn)} → {fmtDate(guest.checkOut)}</p>
      </div>

      {/* Content */}
      <div style={{ padding:'20px 16px 100px', maxWidth:'560px', margin:'0 auto' }}>
        <button onClick={onAddNote} style={{ width:'100%', padding:'13px', borderRadius:'8px', border:`1.5px solid ${C.navy}`, background:C.white, color:C.navy, fontSize:'14.5px', fontWeight:600, cursor:'pointer', marginBottom:'22px', display:'flex', alignItems:'center', justifyContent:'center', gap:'8px' }}>
          {SVG.plusSm} Add a note
        </button>

        <p style={{ margin:'0 0 14px', fontSize:'11px', color:C.inkSoft, textTransform:'uppercase', letterSpacing:'0.03em', fontWeight:600 }}>
          Timeline — {notes.length} {notes.length === 1 ? 'entry' : 'entries'}
        </p>

        {notes.length === 0
          ? <p style={{ fontSize:'14px', color:C.inkSoft }}>No notes yet for this guest.</p>
          : notes.map((n, i) => <NoteRow key={n.id} note={n} isFirst={i === 0} />)
        }
      </div>
    </div>
  );
}

// ─── Main app ─────────────────────────────────────────────────────────────────
function App() {
  const [guests, setGuests]           = useState(SEED_GUESTS);
  const [notes, setNotes]             = useState(SEED_NOTES);
  const [search, setSearch]           = useState('');
  const [showNewForm, setShowNewForm] = useState(false);
  const [showAddNote, setShowAddNote] = useState(false);
  const [selectedId, setSelectedId]   = useState(null);
  const [loading, setLoading]         = useState(false);
  const [connected, setConnected]     = useState(!!API_URL);

  const loadData = useCallback(async () => {
    if (!API_URL) return;
    setLoading(true);
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      setGuests(data.guests || []);
      setNotes(data.notes || []);
      setConnected(true);
    } catch { setConnected(false); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  const notesByGuest = useMemo(() => {
    const map = {};
    for (const n of notes) {
      if (!map[n.guestId]) map[n.guestId] = [];
      map[n.guestId].push(n);
    }
    for (const id in map) map[id].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    return map;
  }, [notes]);

  const activeGuests = useMemo(() => guests.filter(g => nightsLeft(g.checkOut) > 0), [guests]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    let list = activeGuests.map(g => {
      const gn = notesByGuest[g.id] || [];
      return { guest:g, notes:gn, latest:gn[0] };
    });
    if (q) list = list.filter(({ guest, notes:gn }) =>
      guest.room.toLowerCase().includes(q) ||
      guest.guestName.toLowerCase().includes(q) ||
      gn.some(n => n.text.toLowerCase().includes(q) || n.metBy.toLowerCase().includes(q))
    );
    return list.sort((a,b) => {
      const at = a.latest ? new Date(a.latest.timestamp) : 0;
      const bt = b.latest ? new Date(b.latest.timestamp) : 0;
      return bt - at;
    });
  }, [activeGuests, notesByGuest, search]);

  const archivedCount = guests.filter(g => nightsLeft(g.checkOut) <= 0).length;
  const selected      = guests.find(g => g.id === selectedId);
  const selectedNotes = selectedId ? (notesByGuest[selectedId] || []) : [];

  async function handleCreateGuest(form) {
    const guestId = `g${Date.now()}`;
    const noteId  = `n${Date.now() + 1}`;
    const newGuest = { id:guestId, room:form.room, guestName:form.guestName, checkIn:form.checkIn, checkOut:form.checkOut };
    const newNote  = { id:noteId, guestId, metBy:form.metBy, text:form.note, timestamp:new Date().toISOString() };
    setGuests(p => [...p, newGuest]);
    setNotes(p => [...p, newNote]);
    setShowNewForm(false);
    if (API_URL) {
      try { await fetch(API_URL, { method:'POST', body:JSON.stringify({ action:'addGuest', guest:newGuest, note:newNote }) }); await loadData(); }
      catch { setConnected(false); }
    }
  }

  async function handleAddNote({ metBy, text }) {
    const noteId  = `n${Date.now()}`;
    const newNote = { id:noteId, guestId:selectedId, metBy, text, timestamp:new Date().toISOString() };
    setNotes(p => [...p, newNote]);
    setShowAddNote(false);
    if (API_URL) {
      try { await fetch(API_URL, { method:'POST', body:JSON.stringify({ action:'addNote', note:newNote }) }); await loadData(); }
      catch { setConnected(false); }
    }
  }

  return (
    <div style={{ minHeight:'100vh', background:C.cream }}>

      {/* ── Header ── */}
      <div style={{ background:`linear-gradient(135deg, ${C.navy}, ${C.navyDark})`, padding:'24px 20px 20px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'4px' }}>
          <div style={{ width:'4px', height:'20px', background:C.gold, borderRadius:'2px' }} />
          <p style={{ margin:0, fontSize:'11px', fontWeight:600, color:C.goldLight, textTransform:'uppercase', letterSpacing:'0.08em' }}>
            The Oberoi Wildflower Hall
          </p>
        </div>
        <h1 style={{ margin:'0 0 16px', fontSize:'24px', fontWeight:600, color:C.white, fontFamily:'Georgia, serif' }}>
          Guest Tracker
        </h1>

        {API_URL && (
          <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'12px' }}>
            <span style={{ display:'flex', alignItems:'center', gap:'5px', fontSize:'11px', color: connected ? '#9FCBA8' : '#E0A0A0', fontWeight:600 }}>
              {connected
                ? <span style={{ width:'6px', height:'6px', borderRadius:'50%', background:'#9FCBA8', display:'inline-block' }} />
                : SVG.wifiOff}
              {connected ? 'Synced with sheet' : 'Offline — showing last known data'}
            </span>
            <button onClick={loadData} disabled={loading} title="Refresh"
              style={{ background:'none', border:'none', cursor:'pointer', color:'#C9D4E3', display:'flex', alignItems:'center', padding:'2px' }}>
              <span style={{ display:'inline-flex', animation: loading ? 'spin 1s linear infinite' : 'none' }}>{SVG.refresh}</span>
            </button>
          </div>
        )}

        <div style={{ position:'relative' }}>
          <span style={{ position:'absolute', left:'14px', top:'50%', transform:'translateY(-50%)', color:C.inkSoft, display:'flex', pointerEvents:'none' }}>
            {SVG.search}
          </span>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search room, guest, associate, or note"
            style={{ width:'100%', padding:'12px 14px 12px 42px', borderRadius:'10px', border:'none', fontSize:'15px', outline:'none', background:C.white, color:C.ink }}
          />
        </div>
      </div>

      {/* ── Guest list ── */}
      <div style={{ padding:'18px 16px 100px', maxWidth:'720px', margin:'0 auto' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px' }}>
          <p style={{ margin:0, fontSize:'13px', fontWeight:600, color:C.inkSoft, textTransform:'uppercase', letterSpacing:'0.03em' }}>
            {filtered.length} active {filtered.length === 1 ? 'guest' : 'guests'}
          </p>
          {archivedCount > 0 && (
            <p style={{ margin:0, fontSize:'12px', color:C.goldDark }}>
              {archivedCount} checked out → archived
            </p>
          )}
        </div>

        {filtered.length === 0
          ? (
            <div style={{ textAlign:'center', padding:'60px 20px', color:C.inkSoft }}>
              <div style={{ opacity:0.3, marginBottom:'12px', display:'flex', justifyContent:'center' }}>{SVG.mapPin}</div>
              <p style={{ margin:0, fontSize:'14px' }}>
                {search ? 'No matching guests or notes found.' : 'No active guests logged yet.'}
              </p>
            </div>
          )
          : filtered.map(({ guest, latest, notes:gn }) => (
              <GuestCard key={guest.id} guest={guest} latestNote={latest} noteCount={gn.length} onClick={() => setSelectedId(guest.id)} />
            ))
        }
      </div>

      {/* ── FAB ── */}
      <button onClick={() => setShowNewForm(true)}
        style={{ position:'fixed', bottom:'24px', right:'20px', zIndex:20, width:'58px', height:'58px', borderRadius:'50%', border:'none', background:C.gold, color:C.white, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 6px 20px rgba(169,130,57,0.4)', fontSize:'32px', lineHeight:1 }}>
        +
      </button>

      {/* ── Modals ── */}
      {showNewForm && <NewGuestForm onSave={handleCreateGuest} onCancel={() => setShowNewForm(false)} />}

      {showAddNote && selected && (
        <AddNoteForm guest={selected} onSave={handleAddNote} onCancel={() => setShowAddNote(false)} />
      )}

      {selectedId && selected && !showAddNote && (
        <GuestDetail guest={selected} notes={selectedNotes} onClose={() => setSelectedId(null)} onAddNote={() => setShowAddNote(true)} />
      )}

      {/* ── Credit ── */}
      <p style={{ position:'fixed', bottom:'8px', left:0, right:0, textAlign:'center', fontSize:'10px', color:'rgba(11,37,69,0.3)', pointerEvents:'none' }}>
        Developer: Chirag.Garg
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
